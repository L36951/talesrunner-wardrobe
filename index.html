    function applySharedLoadout(){

      const params=new URLSearchParams(location.hash.slice(1));
      if(params.get('v')!=='1')return;
      ['avatar','role'].forEach(target=>{
        if(!params.has(target))return;
        items.forEach(item=>equipped[target][item.id]=false);
        const occupiedSlots=new Set();
        params.get(target).split(',').filter(Boolean).forEach(id=>{

          equipped[target][item.id]=true;
          item.slots.forEach(slot=>occupiedSlots.add(slot));
        });
      });
      const sharedView=params.get('view');
      if(sharedView==='avatar'||sharedView==='role')activeLoadout=sharedView;

    }
    function getEffectiveItemsFor(target){
      const characterItems=items.filter(item=>item.equipmentType==='role'&&equipped.role[item.id]);
      const avatarItems=target==='avatar'?items.filter(item=>item.equipmentType==='avatar'&&equipped.avatar[item.id]):[];
      return [...characterItems,...avatarItems];
    }
    function getEffectiveItems(){return getEffectiveItemsFor(activeLoadout)}
    function isSetActive(setId){
      const definition=setDefs[setId];
      const setItems=items.filter(item=>item.setId===setId);
      return Boolean(definition&&setItems.length&&setItems.every(item=>equipped[definition.equipmentType][item.id]));
    }
    function getModeRule(item,target){
      if(item.equipmentType===target){
        return target==='avatar'?'<div class="tooltip-rule">[Avatar 裝備欄穿用時發動能力值]<b>※ Avatar view 會再疊加角色裝備能力值</b><b>※ 男角色專屬道具</b></div>':'<div class="tooltip-rule">[角色裝備欄穿用時發動能力值]<b>※ 此角色裝備能力值正常生效</b><b>※ 男角色專屬道具</b></div>';
      }
      const correctTarget=item.equipmentType==='avatar'?'Avatar':'角色';
      const currentTarget=target==='avatar'?'Avatar':'角色';
      return `<div class="tooltip-mode-warning">[${currentTarget} 裝備欄]<br>此物品屬於 ${correctTarget} 裝備，放在這裡只顯示外觀；能力值及套裝效果不會生效。</div>`;
    }
    function getSetTooltipMarkup(item,target){
      const definition=setDefs[item.setId];
      if(!definition)return '';
      const active=item.equipmentType===target&&isSetActive(item.setId);
      return `<div class="tooltip-set ${active?'':'inactive'}"><b>${definition.name} ${active?'・生效中':'・未生效'}</b>${definition.stats.map(([text])=>`<span>${text}</span>`).join('')}${definition.special.map(text=>`<span>${text}</span>`).join('')}</div>`;
    }
    function getTopStatTotals(){
      const totals=new Map();
      const addTextStat=text=>{
        const match=text.match(/^(.+?)\s+\+([\d,.]+)(%)?$/);
        if(!match)return;
        const name=match[1];
        const value=Number(match[2].replaceAll(',',''));
        totals.set(name,(totals.get(name)||0)+value);
      };
      getEffectiveItemsFor(activeLoadout).forEach(item=>{
        item.stats.forEach(([text])=>addTextStat(text));
        if(item.extra)addTextStat(item.extra);
      });
      const effectiveTypes=activeLoadout==='avatar'?new Set(['avatar','role']):new Set(['role']);
      Object.entries(setDefs).filter(([setId,definition])=>effectiveTypes.has(definition.equipmentType)&&isSetActive(setId)).forEach(([,definition])=>definition.stats.forEach(([text])=>addTextStat(text)));
      return totals;
    }
    function renderTopStats(){
      const totals=getTopStatTotals();
      Object.entries(baseStats).forEach(([name,base])=>{
        const modifier=totals.get(name)||0;
        const appliedModifier=Math.max(0,Math.min(modifier,15-base));
        const total=Math.min(15,base+appliedModifier);
        const valueNode=document.querySelector(`[data-top-value="${name}"]`);
        const baseBarNode=document.querySelector(`[data-base-bar="${name}"]`);
        const bonusBarNode=document.querySelector(`[data-bonus-bar="${name}"]`);
        valueNode.textContent=formatStatNumber(total);
        valueNode.title=`基本 ${base} ＋ 裝備 ${formatStatNumber(appliedModifier)}（上限 15）`;
        baseBarNode.style.width=`${base/15*100}%`;
        bonusBarNode.style.width=`${appliedModifier/15*100}%`;
      });
      const luck=totals.get('幸運')||0;
      luckValue.textContent=`${luck.toFixed(2)}%`;
      luckValue.title=`目前有效裝備幸運：${luck.toFixed(2)}%`;
    }
    function showTooltip(item,card){
      const statEligible=item.equipmentType===activeLoadout;
      itemTooltip.innerHTML=`
        <div class="tooltip-head"><img src="${item.img}" alt=""><div><h4>${item.name}</h4><span>${item.category} → ${item.subcategory}・佔用 ${item.occupancy}</span></div></div>
        <p class="tooltip-description">${item.description}</p>
        ${getModeRule(item,activeLoadout)}
        <div class="tooltip-section">[附加功能]</div>
        <div class="tooltip-stats">${item.stats.map(([text,tone])=>`<span class="${tone}">${text}</span>`).join('')}</div>
        ${item.extra?`<div class="tooltip-section">[${item.equipmentType==='avatar'?'Avatar':'角色'} 裝備附加功能]</div><div class="tooltip-extra">${item.extra}</div>`:''}
        ${getSetTooltipMarkup(item,activeLoadout)}`;
      itemTooltip.classList.toggle('role-mode',!statEligible);itemTooltip.classList.add('show');itemTooltip.setAttribute('aria-hidden','false');
      const gap=8;
      const tooltipWidth=itemTooltip.offsetWidth;
      const tooltipHeight=itemTooltip.offsetHeight;
      const rightPosition=card.offsetLeft+card.offsetWidth+gap;
      const leftPosition=card.offsetLeft-tooltipWidth-gap;
      const fitsRight=rightPosition+tooltipWidth<=wardrobeBody.clientWidth-4;
      itemTooltip.style.left=`${Math.max(4,Math.min(fitsRight?rightPosition:leftPosition,wardrobeBody.clientWidth-tooltipWidth-4))}px`;
      itemTooltip.style.top=`${Math.max(4,Math.min(card.offsetTop,wardrobeBody.clientHeight-tooltipHeight-4))}px`;
    }
    function hideTooltip(){itemTooltip.classList.remove('show');itemTooltip.setAttribute('aria-hidden','true')}
    function showRailTooltip(slot,target){
      const label=slot.dataset.slotLabel;
      const item=items.find(candidate=>candidate.id===slot.dataset.itemId);
      const targetName=target==='avatar'?'Avatar':'角色';
      if(!item){
        railTooltip.innerHTML=`<h4>${label}</h4><span class="slot-kind">${targetName}裝備欄位</span><p class="slot-empty">目前未有裝備</p>`;
        railTooltip.classList.remove('role-mode');
      }else{
        const blocked=slot.classList.contains('blocked');
        const statEligible=item.equipmentType===target;
        railTooltip.innerHTML=`
          <div class="rail-tooltip-head"><img src="${item.img}" alt=""><div><h4>${item.name}</h4><span class="slot-kind">${targetName}・${label}・佔用 ${item.occupancy}</span></div></div>
          <p class="slot-state ${blocked?'blocked':''}">${blocked?`${label}格已被此裝備佔用`:`裝備於${label}格`}</p>
          <p class="slot-description">${item.description}</p>
          ${getModeRule(item,target)}
          <div class="tooltip-section">[附加功能]</div>
          <div class="tooltip-stats">${item.stats.map(([text,tone])=>`<span class="${tone}">${text}</span>`).join('')}</div>
          ${item.extra?`<div class="tooltip-section">[${item.equipmentType==='avatar'?'Avatar':'角色'} 裝備附加功能]</div><div class="tooltip-extra">${item.extra}</div>`:''}
          ${getSetTooltipMarkup(item,target)}`;
        railTooltip.classList.toggle('role-mode',!statEligible);
      }
      railTooltip.classList.add('show');railTooltip.setAttribute('aria-hidden','false');
      const rail=slot.closest('.rail');
      railTooltip.style.left=target==='avatar'?'97px':'105px';
      const desiredTop=rail.offsetTop+slot.offsetTop-5;
      railTooltip.style.top=`${Math.max(6,Math.min(desiredTop,room.clientHeight-railTooltip.offsetHeight-8))}px`;
    }
    function hideRailTooltip(){railTooltip.classList.remove('show');railTooltip.setAttribute('aria-hidden','true')}
    function formatStatNumber(value){
      return Number(value).toLocaleString('en-US',{maximumFractionDigits:2});
    }
    function getCheckedStatItems(){
      const avatarItems=statsSources.avatar?items.filter(item=>item.equipmentType==='avatar'&&equipped.avatar[item.id]):[];
      const roleItems=statsSources.role?items.filter(item=>item.equipmentType==='role'&&equipped.role[item.id]):[];
      return [...avatarItems,...roleItems];
    }
    function getIntegratedStatRows(){
      const totals=new Map();
      const addTextStat=(text,tone='green')=>{
        const match=text.match(/^(.+?)\s+\+([\d,.]+)(%)?$/);
        if(!match)return;
        const name=match[1];
        const value=Number(match[2].replaceAll(',',''));
        const unit=match[3]||'';
        const current=totals.get(name)||{value:0,unit,tone};
        current.value+=value;
        totals.set(name,current);
      };
      getCheckedStatItems().forEach(item=>{
        item.stats.forEach(([text,tone])=>addTextStat(text,tone));
        if(item.extra)addTextStat(item.extra,'red');
      });
      const activeSets=Object.entries(setDefs).filter(([setId,definition])=>statsSources[definition.equipmentType]&&isSetActive(setId));
      activeSets.forEach(([,definition])=>definition.stats.forEach(([text,tone])=>addTextStat(text,tone)));
      const rows=Object.entries(baseStats).map(([name,base])=>{
        const modifier=totals.get(name)?.value||0;
        totals.delete(name);
        const appliedModifier=Math.max(0,Math.min(modifier,15-base));
        return {name,value:`${formatStatNumber(Math.min(15,base+appliedModifier))}${modifier?` (+${formatStatNumber(appliedModifier)})`:''}`,tone:modifier?'blue':'green'};
      });
      const preferred=['幸運','bonus EXP','bonus TR','抵抗暈眩','障礙持續時間減少','強化對戰頻道攻擊','最大體力值','每回合最大獲得經驗值','童話藝術頻道 bonus EXP','童話藝術頻道 bonus TR','童話藝術頻道貢獻點數','變身結束時體力恢復','變身成功時持續時間增加','傳染時攻擊速度','傳染持續時間'];
      const ordered=[...totals.entries()].sort(([a],[b])=>{
        const ai=preferred.indexOf(a);const bi=preferred.indexOf(b);
        return (ai<0?999:ai)-(bi<0?999:bi);
      });
      ordered.forEach(([name,data])=>rows.push({name,value:`+${formatStatNumber(data.value)}${data.unit}`,tone:data.tone}));
      activeSets.forEach(([,definition])=>definition.special.forEach(text=>rows.push({name:`套裝：${text}`,value:'生效',tone:'gold'})));
      return rows;
    }
    function renderStatsSummary(){
      document.querySelectorAll('[data-stats-target]').forEach(button=>button.classList.toggle('open',statsSources[button.dataset.statsTarget]));
      const open=statsSources.avatar||statsSources.role;
      statsSummaryPanel.classList.toggle('hidden',!open);
      if(!open)return;
      const rows=getIntegratedStatRows();
      const pageCount=Math.max(1,Math.ceil(rows.length/statsPerPage));
      statsPage=Math.min(statsPage,pageCount-1);
      const pageRows=rows.slice(statsPage*statsPerPage,(statsPage+1)*statsPerPage);
      const both=statsSources.avatar&&statsSources.role;
      summaryTitle.textContent=`${both?'Avatar＋角色':statsSources.avatar?'Avatar':'角色'}・整體能力值`;
      summarySource.textContent=both?'整合兩邊裝備':statsSources.avatar?'只計 Avatar 裝備':'只計角色裝備';
      summaryList.innerHTML=pageRows.length?pageRows.map(row=>`<div class="summary-row"><span class="summary-name">${row.name}</span><span class="summary-value ${row.tone}">${row.value}</span></div>`).join(''):'<div class="summary-empty">暫時沒有能力值</div>';
      summaryPage.textContent=`${statsPage+1} / ${pageCount}`;
      summaryPrev.disabled=statsPage===0;
      summaryNext.disabled=statsPage>=pageCount-1;
    }
    function renderRail(target,element){
      element.innerHTML=slotDefs.map(([id,label,symbol])=>{
        const item=items.find(candidate=>equipped[target][candidate.id]&&candidate.slots.includes(id));
        const isPrimary=item&&item.primarySlot===id;
        const isBlocked=item&&!isPrimary;
        const stateClass=isPrimary?'equipped occupied':isBlocked?'blocked occupied':'';
        const content=isPrimary?`<img src="${item.img}" alt="${item.name}">`:isBlocked?'<span class="block-mark">×</span>':symbol;
        const stateLabel=isPrimary?label:isBlocked?`${label}已佔用`:'';
        const ariaText=item?`${label}：${isPrimary?item.name:'被'+item.name+'佔用'}`:`${label}：空裝備欄位`;
        return `<div class="rail-slot ${stateClass}" data-label="${stateLabel}" data-slot-label="${label}" data-item-id="${item?item.id:''}" tabindex="0" aria-label="${ariaText}">${content}</div>`;
      }).join('');
      element.querySelectorAll('.rail-slot').forEach(slot=>{
        slot.addEventListener('mouseenter',()=>showRailTooltip(slot,target));
        slot.addEventListener('mouseleave',hideRailTooltip);
        slot.addEventListener('focus',()=>showRailTooltip(slot,target));
        slot.addEventListener('blur',hideRailTooltip);
      });
    }
    function renderRails(){
      hideRailTooltip();
      renderRail('avatar',avatarRail);
      renderRail('role',roleRail);
    }
    function renderSubtabs(){
      const tabs=subtabsByCategory[selectedCategory]||['全部'];
      subtabList.innerHTML=tabs.map(tab=>`<button class="${tab===selectedSubtab?'active':''}" data-subtab="${tab}">${tab}</button>`).join('');
      subtabList.querySelectorAll('[data-subtab]').forEach(button=>button.addEventListener('click',()=>{selectedSubtab=button.dataset.subtab;renderSubtabs();renderGrid()}));
    }
    function renderGrid(){
      const normalizedQuery=searchQuery.trim().toLocaleLowerCase();
      const visibleItems=items.filter(item=>{
        if(!normalizedQuery)return item.category===selectedCategory&&item.subcategory===selectedSubtab;
        const searchable=[item.name,item.description,item.category,item.subcategory,item.occupancy,item.equipmentType,...item.stats.map(([text])=>text),item.extra].join(' ').toLocaleLowerCase();
        return searchable.includes(normalizedQuery);
      });
      const activeEquipped=equipped[activeLoadout];
      const cards=visibleItems.map((item,index)=>`<article class="item-card ${activeEquipped[item.id]?'':'not-worn'} ${index===0?'selected':''}" data-id="${item.id}" role="button" tabindex="0" aria-pressed="${Boolean(activeEquipped[item.id])}" aria-label="${activeEquipped[item.id]?'卸下':'穿著'} ${item.name}">
        <button class="favorite">☆</button><span class="avatar-mark ${item.equipmentType==='role'?'role-type':''}">${item.equipmentType==='avatar'?'A':'R'}</span>
        <span class="item-icon"><img src="${item.img}" alt="${item.name}"></span>
        <h3>${item.name}</h3><div class="occupancy">佔用：${item.occupancy}</div>
        <div class="card-actions"><button class="${activeEquipped[item.id]?'remove':'wear'}" data-action="toggle">${activeEquipped[item.id]?'已穿著':'穿著'}</button><button class="disabled">快捷</button></div>
      </article>`);
      while(cards.length<16) cards.push('<div class="empty-card" aria-label="空裝備欄位"></div>');
      grid.innerHTML=cards.join('');
      const toggleEquipment=id=>{
        const item=items.find(value=>value.id===id); const willEquip=!equipped[activeLoadout][id];
        if(willEquip){items.filter(candidate=>equipped[activeLoadout][candidate.id]&&candidate.slots.some(slot=>item.slots.includes(slot))).forEach(candidate=>equipped[activeLoadout][candidate.id]=false)}
        equipped[activeLoadout][id]=willEquip;
        syncLoadoutUrl();
        const targetName=activeLoadout==='avatar'?'Avatar 裝備':'角色裝備';
        notify(willEquip?`已穿著「${item.name}」到${targetName}`:`已從${targetName}卸下「${item.name}」`); hideTooltip(); renderAll();
      };
      grid.querySelectorAll('[data-action="toggle"]').forEach(button=>button.addEventListener('click',event=>{
        event.stopPropagation();toggleEquipment(event.target.closest('.item-card').dataset.id);
      }));
      grid.querySelectorAll('.item-card').forEach(card=>{
        const item=items.find(value=>value.id===card.dataset.id);
        card.addEventListener('mouseenter',()=>showTooltip(item,card));
        card.addEventListener('mouseleave',hideTooltip);
        card.addEventListener('focusin',()=>showTooltip(item,card));
        card.addEventListener('focusout',event=>{if(!card.contains(event.relatedTarget))hideTooltip()});
        card.addEventListener('click',event=>{if(event.target.closest('button'))return;toggleEquipment(card.dataset.id)});
        card.addEventListener('keydown',event=>{if(event.target===card&&(event.key==='Enter'||event.key===' ')){event.preventDefault();toggleEquipment(card.dataset.id)}});
      });
    }
    function renderTargetState(){
      document.querySelectorAll('.rail[data-loadout]').forEach(rail=>rail.classList.toggle('active-target',rail.dataset.loadout===activeLoadout));
      const name=activeLoadout==='avatar'?'Avatar 裝備':'角色裝備';
      const effectiveCount=getEffectiveItems().length;
      targetHint.textContent=activeLoadout==='avatar'?`生效：Avatar 裝備 stats ＋ 角色裝備 stats（${effectiveCount}件）`:`生效：只計角色裝備 stats（${effectiveCount}件）`;
    }
    document.querySelectorAll('[data-loadout-target]').forEach(button=>button.addEventListener('click',()=>{
      activeLoadout=button.dataset.loadoutTarget;syncLoadoutUrl();hideTooltip();hideRailTooltip();renderAll();
    }));
    document.querySelectorAll('[data-stats-target]').forEach(button=>button.addEventListener('click',()=>{
      const target=button.dataset.statsTarget;
      statsSources[target]=!statsSources[target];
      statsPage=0;
      hideTooltip();hideRailTooltip();renderStatsSummary();
    }));
    summaryPrev.addEventListener('click',()=>{if(statsPage>0){statsPage-=1;renderStatsSummary()}});
    summaryNext.addEventListener('click',()=>{statsPage+=1;renderStatsSummary()});
    shareLoadoutBtn.addEventListener('click',shareCurrentLoadout);
    equipmentSearch.addEventListener('input',()=>{searchQuery=equipmentSearch.value;hideTooltip();renderGrid()});
    equipmentSearch.addEventListener('keydown',event=>{if(event.key==='Escape'&&equipmentSearch.value){equipmentSearch.value='';searchQuery='';renderGrid()}});
    document.querySelectorAll('.category-tabs [data-category]').forEach(button=>button.addEventListener('click',()=>{
      selectedCategory=button.dataset.category;
      selectedSubtab=defaultSubtab[selectedCategory]||(subtabsByCategory[selectedCategory]||['全部'])[0];
      document.querySelectorAll('.category-tabs [data-category]').forEach(tab=>tab.classList.toggle('active',tab===button));
      renderSubtabs();renderGrid();
    }));
    function renderAll(){renderRails();renderSubtabs();renderGrid();renderTargetState();renderStatsSummary();renderTopStats()}
    function fit(){const inset=10;const availableWidth=Math.max(1,innerWidth-inset*2);const availableHeight=Math.max(1,innerHeight-inset*2);const scale=Math.min(availableWidth/1020,availableHeight/708);const viewport=document.getElementById('viewport');viewport.style.width=`${1020*scale}px`;viewport.style.height=`${708*scale}px`;document.getElementById('game').style.transform=`scale(${scale})`}
    addEventListener('resize',fit);applySharedLoadout();fit();renderAll();
  </script>
</body>
</html>
